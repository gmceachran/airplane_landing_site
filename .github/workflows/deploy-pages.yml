# Build static site and deploy to GitHub Pages.
#
# Current deployment target: custom domain (roswellaero.com), served at the
# domain root. `public/CNAME` is committed so the domain survives every deploy.
#
# One-time repo setup: Settings → Pages → Build and deployment → Source: GitHub
# Actions; add the custom domain in the same settings page.
#
# If you ever move back to https://<owner>.github.io/<repo>/, set
# VITE_BASE_PATH=/<repo>/ in the Build step and remove public/CNAME.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Build
        run: |
          npm run build
          cp dist/index.html dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Required on this job (not only at workflow level) so GITHUB_TOKEN can deploy.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
